# ==================== Gitee Go 流水线配置 ====================
# 用途：构建 Flutter APK 并发布到 Gitee Releases
# 触发条件：master 分支 push 或 tag push
# 注意：需在 Gitee 仓库设置中开通 Gitee Go，并配置 GITEE_TOKEN Secret

image: ubuntu:22.04

stages:
  - build
  - release

variables:
  PUB_HOSTED_URL: "https://mirrors.tuna.tsinghua.edu.cn/dart-pub"
  FLUTTER_STORAGE_BASE_URL: "https://mirrors.tuna.tsinghua.edu.cn/flutter"
  FLUTTER_VERSION: "3.44.2"

# 缓存 Flutter SDK，减少重复下载
cache:
  key: "flutter-${FLUTTER_VERSION}"
  paths:
    - flutter/

before_script:
  - apt-get update -qq && apt-get install -y -qq curl git unzip xz-utils libglu1-mesa openjdk-17-jdk wget python3
  - |
    if [ ! -f "flutter/bin/flutter" ]; then
      echo "下载 Flutter SDK ${FLUTTER_VERSION}..."
      # 优先使用国内镜像，失败则回退到官方源
      wget -q --timeout=60 "https://storage.flutter-io.cn/flutter_infra_release/releases/stable/linux/flutter_linux_${FLUTTER_VERSION}-stable.tar.xz" -O flutter_sdk.tar.xz \
        || wget -q --timeout=60 "https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_${FLUTTER_VERSION}-stable.tar.xz" -O flutter_sdk.tar.xz
      tar xf flutter_sdk.tar.xz
      rm -f flutter_sdk.tar.xz
    fi
  - export PATH="$PATH:$PWD/flutter/bin"
  - flutter config --no-analytics
  - git config --global user.email "ci@pure-enjoy.dev"
  - git config --global user.name "Gitee CI"

# ==================== 阶段一：构建 APK ====================
build_apk:
  stage: build
  only:
    - master
    - tags
  script:
    - flutter doctor
    - flutter pub get
    - flutter build apk --release
  artifacts:
    paths:
      - build/app/outputs/apk/release/*.apk
    expire_in: 1 week

# ==================== 阶段二：发布到 Gitee Releases ====================
release_apk:
  stage: release
  only:
    - tags
  dependencies:
    - build_apk
  script:
    - |
      set -e
      APK_FILE=$(ls build/app/outputs/apk/release/*.apk | head -n1)
      APK_NAME=$(basename "$APK_FILE")

      # 获取仓库信息（兼容不同 clone URL 格式）
      REPO_URL=$(git remote get-url origin 2>/dev/null || echo "")
      if echo "$REPO_URL" | grep -q "gitee.com"; then
        OWNER=$(echo "$REPO_URL" | sed -n 's|.*gitee.com/\([^/]*\)/\([^/]*\).*|\1|p')
        REPO=$(echo "$REPO_URL" | sed -n 's|.*gitee.com/\([^/]*\)/\([^/]*\).*|\2|p')
      else
        # fallback：从 git config 或环境变量读取
        OWNER="${GITEE_REPO_OWNER:-youpgc}"
        REPO="${GITEE_REPO_NAME:-pure-enjoy}"
      fi
      REPO=$(echo "$REPO" | sed 's/\.git$//')

      # 获取 tag 名称
      TAG_NAME="${CI_COMMIT_TAG:-}"
      if [ -z "$TAG_NAME" ]; then
        TAG_NAME=$(git describe --tags --exact-match 2>/dev/null || echo "")
      fi
      if [ -z "$TAG_NAME" ]; then
        echo "⚠️ 未找到 tag，跳过 release"
        exit 0
      fi

      echo "📦 发布 Release: $TAG_NAME -> $OWNER/$REPO"
      echo "📱 APK: $APK_NAME"

      # 创建 Gitee Release
      CREATE_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
        "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/releases" \
        -H "Content-Type: application/json" \
        -H "Authorization: token ${GITEE_TOKEN}" \
        -d "{\"tag_name\":\"${TAG_NAME}\",\"name\":\"${TAG_NAME}\",\"body\":\"自动构建发布\",\"prerelease\":false,\"target_commitish\":\"master\"}")

      HTTP_CODE=$(echo "$CREATE_RESPONSE" | tail -n1)
      BODY=$(echo "$CREATE_RESPONSE" | sed '$d')

      if [ "$HTTP_CODE" = "422" ]; then
        echo "ℹ️ Release 已存在，获取已有 release"
        RELEASE_RESPONSE=$(curl -s "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/releases/tags/${TAG_NAME}" \
          -H "Authorization: token ${GITEE_TOKEN}")
        RELEASE_ID=$(echo "$RELEASE_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))")
      elif [ "$HTTP_CODE" != "201" ]; then
        echo "❌ 创建 Release 失败: HTTP $HTTP_CODE"
        echo "$BODY"
        exit 1
      else
        RELEASE_ID=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
      fi

      if [ -z "$RELEASE_ID" ]; then
        echo "❌ 无法获取 Release ID"
        exit 1
      fi

      # 上传 APK 附件
      echo "⬆️ 上传 APK: $APK_NAME -> Release $RELEASE_ID"
      UPLOAD_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
        "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/releases/${RELEASE_ID}/attach_files" \
        -H "Authorization: token ${GITEE_TOKEN}" \
        -F "file=@${APK_FILE}")

      UPLOAD_CODE=$(echo "$UPLOAD_RESPONSE" | tail -n1)
      if [ "$UPLOAD_CODE" != "201" ]; then
        echo "❌ 上传附件失败: HTTP $UPLOAD_CODE"
        echo "$UPLOAD_RESPONSE" | sed '$d'
        exit 1
      fi

      echo "✅ Gitee Release 发布成功: https://gitee.com/${OWNER}/${REPO}/releases/${TAG_NAME}"
