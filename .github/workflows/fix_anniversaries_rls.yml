name: Fix Anniversaries RLS

on:
  workflow_dispatch:

jobs:
  fix-rls:
    runs-on: ubuntu-latest
    steps:
      - name: Fix RLS policies for user_anniversaries
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          PROJECT_REF="mhdrbjpqmzswswoazwjg"
          
          # Step 1: List existing policies
          echo "=== Existing policies ==="
          LIST_RESULT=$(curl -s -X POST \
            "https://api.supabase.com/v1/projects/$PROJECT_REF/database/query" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query": "SELECT policyname FROM pg_policies WHERE tablename = '\''user_anniversaries'\'';"}')
          echo "$LIST_RESULT"
          
          # Step 2: Drop ALL existing policies and create permissive ones
          echo "=== Fixing RLS ==="
          FIX_RESULT=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.supabase.com/v1/projects/$PROJECT_REF/database/query" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query": "DO $$ DECLARE r RECORD; BEGIN FOR r IN SELECT policyname FROM pg_policies WHERE tablename = '\''user_anniversaries'\'' LOOP EXECUTE format('\''DROP POLICY IF EXISTS %I ON user_anniversaries'\'', r.policyname); END LOOP; END $$; CREATE POLICY \"user_anniversaries_select\" ON user_anniversaries FOR SELECT USING (true); CREATE POLICY \"user_anniversaries_insert\" ON user_anniversaries FOR INSERT WITH CHECK (true); CREATE POLICY \"user_anniversaries_update\" ON user_anniversaries FOR UPDATE USING (true) WITH CHECK (true); CREATE POLICY \"user_anniversaries_delete\" ON user_anniversaries FOR DELETE USING (true);"}')
          
          HTTP_CODE=$(echo "$FIX_RESULT" | tail -1)
          echo "Fix result: HTTP $HTTP_CODE"
          echo "$FIX_RESULT"
          
          # Step 3: Verify
          echo "=== Verify policies ==="
          VERIFY=$(curl -s -X POST \
            "https://api.supabase.com/v1/projects/$PROJECT_REF/database/query" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query": "SELECT policyname, cmd FROM pg_policies WHERE tablename = '\''user_anniversaries'\'';"}')
          echo "$VERIFY"
          
          # Step 4: Test with anon key
          echo "=== Test with anon key ==="
          ANON_TEST=$(curl -s -w "\n%{http_code}" \
            "https://$PROJECT_REF.supabase.co/rest/v1/user_anniversaries?select=id,title&limit=5" \
            -H "apikey: sb_publishable_wFx9tlxImVfEpRN4NMkS1g_QOm64aj6" \
            -H "Authorization: Bearer sb_publishable_wFx9tlxImVfEpRN4NMkS1g_QOm64aj6")
          ANON_CODE=$(echo "$ANON_TEST" | tail -1)
          echo "Anon query: HTTP $ANON_CODE"
          echo "$ANON_TEST"
          
          if [ "$ANON_CODE" = "200" ]; then
            echo "✅ RLS fixed successfully"
          else
            echo "❌ RLS fix failed"
          fi
