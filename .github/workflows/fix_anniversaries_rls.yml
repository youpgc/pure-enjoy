name: Fix Anniversaries RLS

on:
  workflow_dispatch:

jobs:
  fix-rls:
    runs-on: ubuntu-latest
    steps:
      - name: Fix RLS policies for user_anniversaries
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          SUPABASE_URL="https://mhdrbjpqmzswswoazwjg.supabase.co"
          
          # Step 1: List all existing policies
          echo "=== Existing policies ==="
          curl -s -X POST "$SUPABASE_URL/pg/query" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d '{"query": "SELECT policyname FROM pg_policies WHERE tablename = '\''user_anniversaries'\'';"}'
          
          # Step 2: Drop ALL existing policies (use DO block to handle missing ones)
          echo "=== Dropping all policies ==="
          RESULT=$(curl -s -w "\n%{http_code}" -X POST "$SUPABASE_URL/pg/query" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "DO $$ DECLARE r RECORD; BEGIN FOR r IN SELECT policyname FROM pg_policies WHERE tablename = '\''user_anniversaries'\'' LOOP EXECUTE format('\''DROP POLICY IF EXISTS %I ON user_anniversaries'\'', r.policyname); END LOOP; END $$;"
            }')
          
          HTTP_CODE=$(echo "$RESULT" | tail -1)
          echo "Drop result: HTTP $HTTP_CODE"
          echo "$RESULT"
          
          # Step 3: Verify all policies are gone
          echo "=== Policies after drop ==="
          curl -s -X POST "$SUPABASE_URL/pg/query" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d '{"query": "SELECT policyname FROM pg_policies WHERE tablename = '\''user_anniversaries'\'';"}'
          
          # Step 4: Create permissive policies (matching other tables)
          echo "=== Creating permissive policies ==="
          RESULT2=$(curl -s -w "\n%{http_code}" -X POST "$SUPABASE_URL/pg/query" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "CREATE POLICY \"user_anniversaries_select\" ON user_anniversaries FOR SELECT USING (true); CREATE POLICY \"user_anniversaries_insert\" ON user_anniversaries FOR INSERT WITH CHECK (true); CREATE POLICY \"user_anniversaries_update\" ON user_anniversaries FOR UPDATE USING (true) WITH CHECK (true); CREATE POLICY \"user_anniversaries_delete\" ON user_anniversaries FOR DELETE USING (true);"
            }')
          
          HTTP_CODE2=$(echo "$RESULT2" | tail -1)
          echo "Create result: HTTP $HTTP_CODE2"
          echo "$RESULT2"
          
          # Step 5: Verify with anon key (same as App)
          echo "=== Verify with anon key ==="
          ANON_RESULT=$(curl -s -w "\n%{http_code}" "$SUPABASE_URL/rest/v1/user_anniversaries?select=id,title&limit=5" \
            -H "apikey: sb_publishable_wFx9tlxImVfEpRN4NMkS1g_QOm64aj6" \
            -H "Authorization: Bearer sb_publishable_wFx9tlxImVfEpRN4NMkS1g_QOm64aj6")
          
          ANON_CODE=$(echo "$ANON_RESULT" | tail -1)
          echo "Anon query: HTTP $ANON_CODE"
          echo "$ANON_RESULT"
          
          if [ "$ANON_CODE" = "200" ]; then
            echo "✅ RLS fixed and verified with anon key"
          else
            echo "❌ Anon query failed"
          fi
