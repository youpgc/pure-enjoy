name: Fix Anniversaries RLS

on:
  workflow_dispatch:

jobs:
  fix-rls:
    runs-on: ubuntu-latest
    steps:
      - name: Fix RLS policies for user_anniversaries
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          SUPABASE_URL="https://mhdrbjpqmzswswoazwjg.supabase.co"
          
          # Drop existing policies and recreate with permissive ones (matching other tables)
          RESULT=$(curl -s -w "\n%{http_code}" -X POST "$SUPABASE_URL/pg/query" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "DROP POLICY IF EXISTS \"Users can view own anniversaries\" ON user_anniversaries; DROP POLICY IF EXISTS \"Users can insert own anniversaries\" ON user_anniversaries; DROP POLICY IF EXISTS \"Users can update own anniversaries\" ON user_anniversaries; DROP POLICY IF EXISTS \"Users can delete own anniversaries\" ON user_anniversaries; DROP POLICY IF EXISTS \"Admin can view all anniversaries\" ON user_anniversaries; DROP POLICY IF EXISTS \"Admin can manage all anniversaries\" ON user_anniversaries; CREATE POLICY \"允许公开读写\" ON user_anniversaries FOR ALL USING (true) WITH CHECK (true);"
            }')
          
          HTTP_CODE=$(echo "$RESULT" | tail -1)
          echo "Fix RLS result: HTTP $HTTP_CODE"
          echo "$RESULT"
          
          # Verify by inserting a test row
          VERIFY=$(curl -s -w "\n%{http_code}" -X POST "$SUPABASE_URL/rest/v1/user_anniversaries" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"id":"test-verify","user_id":"test","title":"test","date":"2026-01-01","type":"birthday"}')
          
          echo "Insert verify: HTTP $VERIFY"
          
          # Clean up test row
          curl -s -X DELETE "$SUPABASE_URL/rest/v1/user_anniversaries?id=eq.test-verify" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" > /dev/null
          
          if [ "$VERIFY" = "201" ]; then
            echo "✅ RLS fixed and verified"
          else
            echo "❌ RLS fix may have failed"
          fi
