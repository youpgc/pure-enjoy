name: Build APK and Upload to GitHub Releases (备用)

# 注意：APK 主构建流程已迁移至 Gitee Go（.gitee-ci.yml）
# 此 workflow 仅作为备用，支持手动触发
on:
  workflow_dispatch:

# 防止同一分支的重复构建
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.44.2'
  JAVA_VERSION: '17'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
      packages: write

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Java 环境
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      # 3. 设置 Flutter 环境
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-dependency-path: pubspec.lock

      # 4. 验证 Flutter 环境
      - name: Verify Flutter installation
        run: |
          flutter --version
          flutter doctor -v

      # 5. 获取依赖
      - name: Get dependencies
        run: flutter pub get

      # 6. 运行代码生成（如果有 build_runner）
      - name: Run build_runner (if needed)
        run: |
          if grep -q "build_runner" pubspec.yaml; then
            flutter pub run build_runner build --delete-conflicting-outputs || true
          fi

      # 7. 运行测试（可选）
      - name: Run tests
        run: flutter test || true

      # 8. 提取版本信息并自动迭代
      - name: Extract and increment version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # 标签触发：从标签提取版本
            VERSION=${GITHUB_REF#refs/tags/v}
            BUILD_NUMBER=$(git rev-list --count HEAD)
          else
            # push 或 workflow_dispatch：读取当前版本并自动迭代
            CURRENT_VERSION=$(grep 'version:' pubspec.yaml | head -n 1 | awk '{print $2}' | cut -d'+' -f1)
            CURRENT_BUILD=$(grep 'version:' pubspec.yaml | head -n 1 | awk '{print $2}' | cut -d'+' -f2)
            
            # 检查最新提交是否为 chore（CI 自动版本号提交），避免循环触发
            LATEST_COMMIT_MSG=$(git log -1 --pretty=format:"%s" HEAD)
            if echo "$LATEST_COMMIT_MSG" | grep -q "^chore:"; then
              echo "⚠️ 最新提交为 chore（自动版本号），跳过版本递增，直接使用当前版本构建"
              VERSION="$CURRENT_VERSION"
              BUILD_NUMBER="$CURRENT_BUILD"
            # 检查上次构建是否失败（通过查询 GitHub API），失败时不递增构建号
            elif curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/actions/runs?per_page=2&branch=${{ github.ref_name }}" | \
              python3 -c "import sys,json; runs=json.load(sys.stdin).get('workflow_runs',[]); 
              # 排除当前正在运行的构建，检查上一次完成的构建
              completed=[r for r in runs if r.get('status')=='completed' and r.get('run_number')!=${{ github.run_number }}];
              print('failure' if completed and completed[0].get('conclusion')=='failure' else 'success')" 2>/dev/null | grep -q "failure"; then
              echo "⚠️ 上次构建失败，本次为修复推送，跳过版本递增，直接使用当前版本构建"
              VERSION="$CURRENT_VERSION"
              BUILD_NUMBER="$CURRENT_BUILD"
            else
              # 解析版本号：major.minor.patch
              MAJOR=$(echo $CURRENT_VERSION | cut -d'.' -f1)
              MINOR=$(echo $CURRENT_VERSION | cut -d'.' -f2)
              PATCH=$(echo $CURRENT_VERSION | cut -d'.' -f3)
              
              # 自动递增修订号（patch）和构建号
              NEW_PATCH=$((PATCH + 1))
              NEW_BUILD=$((CURRENT_BUILD + 1))
              
              VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
              BUILD_NUMBER="${NEW_BUILD}"
              
              echo "🔄 版本自动迭代: v${CURRENT_VERSION}+${CURRENT_BUILD} → v${VERSION}+${BUILD_NUMBER}"
              
              # 更新 pubspec.yaml 中的版本号
              sed -i "s/version: ${CURRENT_VERSION}+${CURRENT_BUILD}/version: ${VERSION}+${BUILD_NUMBER}/" pubspec.yaml
              
              # 配置 git 并提交版本更新
              git config user.name "GitHub Actions"
              git config user.email "actions@github.com"
              git add pubspec.yaml
              git commit -m "chore: 自动迭代版本号 v${CURRENT_VERSION}+${CURRENT_BUILD} → v${VERSION}+${BUILD_NUMBER}"
              
              # 带重试的 push，避免竞态冲突
              for i in 1 2 3; do
                git pull --rebase origin ${{ github.ref_name }} && git push origin HEAD:${{ github.ref_name }} && break
                echo "⚠️ Push failed, retrying in 3s... (attempt $i/3)"
                sleep 3
                # 重新读取可能被其他构建更新的版本号
                CURRENT_VERSION=$(grep 'version:' pubspec.yaml | head -n 1 | awk '{print $2}' | cut -d'+' -f1)
                CURRENT_BUILD=$(grep 'version:' pubspec.yaml | head -n 1 | awk '{print $2}' | cut -d'+' -f2)
                MAJOR=$(echo $CURRENT_VERSION | cut -d'.' -f1)
                MINOR=$(echo $CURRENT_VERSION | cut -d'.' -f2)
                PATCH=$(echo $CURRENT_VERSION | cut -d'.' -f3)
                NEW_PATCH=$((PATCH + 1))
                NEW_BUILD=$((CURRENT_BUILD + 1))
                VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
                BUILD_NUMBER="${NEW_BUILD}"
                sed -i "s/version: ${CURRENT_VERSION}+${CURRENT_BUILD}/version: ${VERSION}+${BUILD_NUMBER}/" pubspec.yaml
                git add pubspec.yaml
                git commit --amend -m "chore: 自动迭代版本号 v${CURRENT_VERSION}+${CURRENT_BUILD} → v${VERSION}+${BUILD_NUMBER}"
              done
            fi
          fi
          # 收集本次 dev 分支提交摘要（用于 Release 展示）
          echo "📝 收集提交摘要..."
          COMMIT_LIST=$(git log --pretty=format:"%s" -n 20 --no-merges 2>/dev/null | \
            grep -v -i -E "^(chore|merge|ci|build|test|revert):" | \
            grep -v -i -E "^Merge (branch|pull request)" | \
            sed 's/^[a-z]*[[:space:]]*:[[:space:]]*//' | \
            sed 's/^[a-z]*([^)]*):[[:space:]]*//' | \
            awk '{print "- " $0}' || echo "")
          if [ -n "$COMMIT_LIST" ]; then
            RELEASE_NOTES="$COMMIT_LIST"
          else
            RELEASE_NOTES="版本更新 v${VERSION}+${BUILD_NUMBER}"
          fi
          echo "$RELEASE_NOTES"

          # 多行输出需特殊处理：使用 URL 编码或替换换行符
          RELEASE_NOTES_ESCAPED=$(echo "$RELEASE_NOTES" | sed ':a;N;$!ba;s/\n/\\n/g')

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "apk_name=pure-enjoy-v${VERSION}-build${BUILD_NUMBER}.apk" >> $GITHUB_OUTPUT
          echo "release_notes<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Version: $VERSION, Build: $BUILD_NUMBER"

      # 9. 构建 APK
      - name: Build APK
        run: |
          flutter build apk --release \
            --build-name=${{ steps.version.outputs.version }} \
            --build-number=${{ steps.version.outputs.build_number }} \
            --split-debug-info=build/symbols \
            --obfuscate \
            --tree-shake-icons \
            --dart-define=FLUTTER_BUILD_MODE=release \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=SUPABASE_URL=https://${{ secrets.SUPABASE_PROJECT_ID }}.supabase.co

      # 10. 查找并重命名 APK 文件
      - name: Find and rename APK
        id: rename
        run: |
          # 查找 APK 文件
          APK_PATH=$(find build/app/outputs/flutter-apk -name "*.apk" | head -1)
          echo "Found APK: $APK_PATH"
          
          if [ -z "$APK_PATH" ]; then
            echo "No APK found!"
            ls -la build/app/outputs/
            ls -la build/app/outputs/flutter-apk/ 2>/dev/null || echo "flutter-apk dir not found"
            exit 1
          fi
          
          # 重命名
          mkdir -p build/app/outputs/apk/release/
          cp "$APK_PATH" "build/app/outputs/apk/release/${{ steps.version.outputs.apk_name }}"
          ls -lh build/app/outputs/apk/release/

      # 11. 计算 APK 文件哈希
      - name: Calculate APK checksum
        id: checksum
        run: |
          CHECKSUM=$(sha256sum "build/app/outputs/apk/release/${{ steps.version.outputs.apk_name }}" | awk '{print $1}')
          echo "sha256=$CHECKSUM" >> $GITHUB_OUTPUT
          echo "SHA256: $CHECKSUM"

      # 12. 获取文件大小
      - name: Get APK file size
        id: filesize
        run: |
          APK_PATH="build/app/outputs/apk/release/${{ steps.version.outputs.apk_name }}"
          echo "Checking APK at: $APK_PATH"
          ls -lh "$APK_PATH"
          FILESIZE=$(stat -c%s "$APK_PATH")
          echo "bytes=$FILESIZE" >> $GITHUB_OUTPUT
          echo "file_size=$FILESIZE" >> $GITHUB_OUTPUT
          echo "Size: $FILESIZE bytes"

      # ===================================================================
      # APK 分发策略：GitHub Releases + 国内镜像加速
      # ===================================================================
      # 问题背景：
      #   1. GitHub 国内访问不稳定，APK 下载经常超时/失败
      #   2. Supabase 免费存储上限 50M，APK 已超过限制
      #   3. 不引入其他第三方平台（阿里云/AWS/腾讯云等）
      #   4. Gitee 需要实名认证，无法满足
      # 解决方案：
      #   - 使用 GitHub Releases 存储 APK（主渠道）
      #   - App 端通过国内镜像加速下载（ghproxy/mirror.ghproxy/ghps.cc）
      #   - 镜像服务自动将 github.com 请求转发到国内 CDN 节点
      # ===================================================================

      # 13. 上传 APK 到 GitHub Releases
      - name: Upload APK to GitHub Releases
        id: upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILE_PATH="build/app/outputs/apk/release/${{ steps.version.outputs.apk_name }}"
          TAG_NAME="v${{ steps.version.outputs.version }}+${{ steps.version.outputs.build_number }}"
          
          echo "File: $FILE_PATH"
          ls -lh "$FILE_PATH"
          
          # 读取 Release Notes（从 Step 8 传递）
          RELEASE_NOTES="${{ steps.version.outputs.release_notes }}"
          if [ -z "$RELEASE_NOTES" ]; then
            RELEASE_NOTES="版本更新 ${{ steps.version.outputs.version }}+${{ steps.version.outputs.build_number }}"
          fi

          # 创建 GitHub Release（使用 jq 构建 JSON 避免 YAML 缩进问题）
          echo "Creating GitHub Release $TAG_NAME..."
          RELEASE_PAYLOAD=$(jq -n --arg tag "$TAG_NAME" --arg name "Pure Enjoy $TAG_NAME" --arg body "$RELEASE_NOTES" '{tag_name: $tag, name: $name, body: $body, draft: false, prerelease: false}')

          RELEASE_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://api.github.com/repos/${{ github.repository }}/releases" \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$RELEASE_PAYLOAD")
          
          RELEASE_HTTP=$(echo "$RELEASE_RESPONSE" | tail -n1)
          RELEASE_BODY=$(echo "$RELEASE_RESPONSE" | sed '$d')
          echo "Release HTTP Code: $RELEASE_HTTP"
          
          # 如果 release 已存在，获取已有 release 的上传 URL
          if [ "$RELEASE_HTTP" = "422" ]; then
            echo "Release already exists, fetching existing release..."
            RELEASE_RESPONSE=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG_NAME" \
              -H "Authorization: token $GITHUB_TOKEN")
            UPLOAD_URL=$(echo "$RELEASE_RESPONSE" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("upload_url","").replace("{?name,label}",""))')
          else
            UPLOAD_URL=$(echo "$RELEASE_BODY" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("upload_url","").replace("{?name,label}",""))')
          fi
          
          echo "Upload URL: $UPLOAD_URL"

          # 如果 release 已存在，检查并删除同名 asset（避免 422 already_exists）
          if [ "$RELEASE_HTTP" = "422" ]; then
            echo "Checking for existing asset with same name..."
            EXISTING_ASSET_ID=$(echo "$RELEASE_RESPONSE" | python3 -c 'import sys,json; data=json.load(sys.stdin); assets=data.get("assets",[]); print(next((a["id"] for a in assets if a["name"]=="'"${{ steps.version.outputs.apk_name }}"'"), ""))')
            if [ -n "$EXISTING_ASSET_ID" ]; then
              echo "Deleting existing asset ID: $EXISTING_ASSET_ID"
              DELETE_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE "https://api.github.com/repos/${{ github.repository }}/releases/assets/$EXISTING_ASSET_ID" \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github.v3+json")
              echo "Delete asset HTTP: $DELETE_RESPONSE"
            fi
          fi

          # 上传 APK 到 release
          echo "Uploading APK to GitHub Release..."
          UPLOAD_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$UPLOAD_URL?name=${{ steps.version.outputs.apk_name }}" \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary @"$FILE_PATH")

          UPLOAD_HTTP=$(echo "$UPLOAD_RESPONSE" | tail -n1)
          UPLOAD_BODY=$(echo "$UPLOAD_RESPONSE" | sed '$d')
          echo "Upload HTTP Code: $UPLOAD_HTTP"

          if [ "$UPLOAD_HTTP" -ne 201 ] && [ "$UPLOAD_HTTP" -ne 200 ]; then
            echo "❌ Upload failed with HTTP $UPLOAD_HTTP"
            echo "Response: $UPLOAD_BODY"
            exit 1
          fi
          
          # 获取下载 URL（公开仓库可直接使用 browser_download_url）
          DOWNLOAD_URL=$(echo "$UPLOAD_BODY" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("browser_download_url",""))')
          echo "download_url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT
          echo "✅ Uploaded to: $DOWNLOAD_URL"

      # ===================================================================
      # 版本状态管理逻辑（三级状态流转）
      # ===================================================================
      #
      # 状态定义：
      #   - released  (已发布)：当前最新可用版本，用户可下载更新
      #   - revoked   (已下架)：已被新版本替代，不再推荐但可回滚
      #   - superseded(已失效)：超过保留期限，彻底废弃不可回滚
      #
      # 执行流程：
      #   Step 1: 将所有 released → revoked（原最新版本降级）
      #   Step 2: 插入新版本，status = released（新王者登基）
      #   Step 3: 清理 GitHub Releases，只保留最新 5 个 APK
      #   Step 4: 将第 6 个及更旧的 revoked 版本 → superseded（彻底失效）
      #
      # 最终状态（按 created_at 降序）：
      #   第1个: released   ← 最新版本，用户可更新
      #   第2-5个: revoked  ← 近期版本，管理后台可回滚
      #   第6个及以后: superseded ← 已失效，仅保留记录
      # ===================================================================

      # Step 1: 将所有 released 版本降级为 revoked
      - name: Step 1 - Demote all released to revoked
        env:
          SUPABASE_URL: https://${{ secrets.SUPABASE_PROJECT_ID }}.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "=== Step 1: 将所有 released 版本降级为 revoked ==="
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          RELEASED=$(curl -s "$SUPABASE_URL/rest/v1/app_versions?select=id,version,build_number,status&status=eq.released" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY")
          RELEASED_COUNT=$(echo "$RELEASED" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(len(d))' 2>/dev/null || echo "0")
          echo "当前 released 版本数: $RELEASED_COUNT"

          if [ "$RELEASED_COUNT" = "0" ]; then
            echo "✅ 没有 released 版本需要降级"
          else
            PATCH_RESPONSE=$(curl -s -w "\n%{http_code}" -X PATCH "$SUPABASE_URL/rest/v1/app_versions?status=eq.released" \
              -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"status\":\"revoked\",\"revoked_at\":\"$NOW\"}")
            PATCH_CODE=$(echo "$PATCH_RESPONSE" | tail -n1)
            echo "✅ 降级完成，PATCH HTTP: $PATCH_CODE"
          fi

      # Step 2: 创建新版本记录（status = released）
      - name: Step 2 - Create new version record (released)
        id: db_record
        env:
          SUPABASE_URL: https://${{ secrets.SUPABASE_PROJECT_ID }}.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          # 获取上次构建时间
          LAST_BUILD_TIME=$(curl -s "$SUPABASE_URL/rest/v1/app_versions?select=created_at&order=created_at.desc&limit=1" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" | \
            python3 -c 'import sys, json; data=json.load(sys.stdin); print(data[0].get("created_at","") if data else "")' 2>/dev/null || echo '')

          echo "Last build time: ${LAST_BUILD_TIME:-none}"

          # 使用 Step 8 已收集的 Release Notes
          RELEASE_NOTES="${{ steps.version.outputs.release_notes }}"
          if [ -z "$RELEASE_NOTES" ]; then
            RELEASE_NOTES="版本更新 ${{ steps.version.outputs.version }}+${{ steps.version.outputs.build_number }}"
          fi

          echo "Release notes:"
          echo "$RELEASE_NOTES"

          # 创建数据库记录
          DB_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$SUPABASE_URL/rest/v1/app_versions" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            -d "{
              \"version\": \"${{ steps.version.outputs.version }}\",
              \"build_number\": ${{ steps.version.outputs.build_number }},
              \"platform\": \"android\",
              \"release_type\": \"feature\",
              \"release_notes\": \"$RELEASE_NOTES\",
              \"apk_url\": \"${{ steps.upload.outputs.download_url }}\",
              \"apk_size\": ${{ steps.filesize.outputs.bytes }},
              \"file_name\": \"${{ steps.version.outputs.apk_name }}\",
              \"checksum\": \"${{ steps.checksum.outputs.sha256 }}\",
              \"status\": \"released\",
              \"is_force_update\": false,
              \"released_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }")

          DB_HTTP_CODE=$(echo "$DB_RESPONSE" | tail -n1)
          echo "Database HTTP Code: $DB_HTTP_CODE"

          if [ "$DB_HTTP_CODE" = "201" ] || [ "$DB_HTTP_CODE" = "200" ]; then
            echo "✅ Database record created successfully"
          else
            echo "❌ Database operation failed with HTTP $DB_HTTP_CODE"
            exit 1
          fi

      # Step 3: 清理旧 GitHub Releases（只保留最新 5 个 APK）
      - name: Step 3 - Clean old GitHub Releases (keep 5)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Step 3: 清理旧 GitHub Releases（保留最新 5 个）==="
          
          # 获取所有 releases（按发布时间倒序）
          RELEASES=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases?per_page=50" \
            -H "Authorization: token $GITHUB_TOKEN")
          
          # 提取第 6 个及以后的 release ID
          OLD_RELEASE_IDS=$(echo "$RELEASES" | python3 -c 'import sys,json; [print(r["id"]) for r in json.load(sys.stdin)[5:]]' 2>/dev/null)
          
          if [ -z "$OLD_RELEASE_IDS" ]; then
            echo "✅ 没有需要清理的旧 releases"
          else
            for RELEASE_ID in $OLD_RELEASE_IDS; do
              echo "🗑️ 删除旧 release: $RELEASE_ID"
              curl -s -o /dev/null -w "%{http_code}" -X DELETE "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID" \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github.v3+json"
              echo ""
            done
            echo "✅ 旧 releases 清理完成"
          fi

      # Step 4: 将第 6 个及更旧的 revoked 版本标记为 superseded（已失效）
      - name: Step 4 - Mark old revoked versions as superseded
        env:
          SUPABASE_URL: https://${{ secrets.SUPABASE_PROJECT_ID }}.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "=== Step 4: 将第 6 个及更旧的 revoked 版本标记为 superseded ==="
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # 查询所有 revoked 版本，按 created_at 降序排列
          REVOKED=$(curl -s "$SUPABASE_URL/rest/v1/app_versions?select=id,version,build_number,status,created_at&status=eq.revoked&order=created_at.desc" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY")
          REVOKED_COUNT=$(echo "$REVOKED" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(len(d))' 2>/dev/null || echo "0")
          echo "当前 revoked 版本数: $REVOKED_COUNT"

          if [ "$REVOKED_COUNT" -le 4 ]; then
            echo "✅ revoked 版本数不超过4个（加上最新的 released 正好5个），不需要标记为 superseded"
          else
            # 跳过前4个 revoked（保留第2-5个），将第5个及以后的 revoked → superseded
            OLD_IDS=$(echo "$REVOKED" | python3 -c 'import sys,json; d=json.load(sys.stdin); [print(r["id"]) for r in d[4:]]' 2>/dev/null)
            OLD_COUNT=$(echo "$OLD_IDS" | wc -l)
            echo "需要标记为 superseded 的数量: $OLD_COUNT"

            for VERSION_ID in $OLD_IDS; do
              echo "⚫ 标记版本 ID=$VERSION_ID 为 superseded"
              PATCH_RESPONSE=$(curl -s -w "\n%{http_code}" -X PATCH "$SUPABASE_URL/rest/v1/app_versions?id=eq.$VERSION_ID" \
                -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
                -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
                -H "Content-Type: application/json" \
                -d "{\"status\":\"superseded\",\"revoked_at\":\"$NOW\"}")
              PATCH_CODE=$(echo "$PATCH_RESPONSE" | tail -n1)
              echo "  PATCH HTTP: $PATCH_CODE"
            done

            echo "✅ 旧版本 superseded 标记完成"
          fi

      # Step 5: 输出总结
      - name: Build summary
        run: |
          echo "✅ Build completed!"
          echo "📱 Version: ${{ steps.version.outputs.version }}+${{ steps.version.outputs.build_number }}"
          echo "📦 File: ${{ steps.version.outputs.apk_name }}"
          echo "🔗 Download: ${{ steps.upload.outputs.download_url }}"
          echo "💾 Size: ${{ steps.filesize.outputs.bytes }} bytes"
          echo "🔐 SHA256: ${{ steps.checksum.outputs.sha256 }}"
