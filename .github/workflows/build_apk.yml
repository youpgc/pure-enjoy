name: Build APK and Upload to Supabase

on:
  push:
    branches: [main, master, develop]
    tags: ['v*']
  workflow_dispatch:

# 防止同一分支的重复构建
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.24.0'
  JAVA_VERSION: '17'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
      packages: write

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Java 环境
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      # 3. 设置 Flutter 环境
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-dependency-path: pubspec.lock

      # 4. 验证 Flutter 环境
      - name: Verify Flutter installation
        run: |
          flutter --version
          flutter doctor -v

      # 5. 获取依赖
      - name: Get dependencies
        run: flutter pub get

      # 6. 运行代码生成（如果有 build_runner）
      - name: Run build_runner (if needed)
        run: |
          if grep -q "build_runner" pubspec.yaml; then
            flutter pub run build_runner build --delete-conflicting-outputs || true
          fi

      # 7. 运行测试（可选）
      - name: Run tests
        run: flutter test || true

      # 8. 提取版本信息并自动迭代
      - name: Extract and increment version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # 标签触发：从标签提取版本
            VERSION=${GITHUB_REF#refs/tags/v}
            BUILD_NUMBER=$(git rev-list --count HEAD)
          else
            # push 或 workflow_dispatch：读取当前版本并自动迭代
            CURRENT_VERSION=$(grep 'version:' pubspec.yaml | head -n 1 | awk '{print $2}' | cut -d'+' -f1)
            CURRENT_BUILD=$(grep 'version:' pubspec.yaml | head -n 1 | awk '{print $2}' | cut -d'+' -f2)
            
            # 检查最新提交是否为 chore（CI 自动版本号提交），避免循环触发
            LATEST_COMMIT_MSG=$(git log -1 --pretty=format:"%s" HEAD)
            if echo "$LATEST_COMMIT_MSG" | grep -q "^chore:"; then
              echo "⚠️ 最新提交为 chore（自动版本号），跳过版本递增，直接使用当前版本构建"
              VERSION="$CURRENT_VERSION"
              BUILD_NUMBER="$CURRENT_BUILD"
            else
              # 解析版本号：major.minor.patch
              MAJOR=$(echo $CURRENT_VERSION | cut -d'.' -f1)
              MINOR=$(echo $CURRENT_VERSION | cut -d'.' -f2)
              PATCH=$(echo $CURRENT_VERSION | cut -d'.' -f3)
              
              # 自动递增修订号（patch）和构建号
              NEW_PATCH=$((PATCH + 1))
              NEW_BUILD=$((CURRENT_BUILD + 1))
              
              VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
              BUILD_NUMBER="${NEW_BUILD}"
              
              echo "🔄 版本自动迭代: v${CURRENT_VERSION}+${CURRENT_BUILD} → v${VERSION}+${BUILD_NUMBER}"
              
              # 更新 pubspec.yaml 中的版本号
              sed -i "s/version: ${CURRENT_VERSION}+${CURRENT_BUILD}/version: ${VERSION}+${BUILD_NUMBER}/" pubspec.yaml
              
              # 配置 git 并提交版本更新
              git config user.name "GitHub Actions"
              git config user.email "actions@github.com"
              git add pubspec.yaml
              git commit -m "chore: 自动迭代版本号 v${CURRENT_VERSION}+${CURRENT_BUILD} → v${VERSION}+${BUILD_NUMBER}"
              
              # 带重试的 push，避免竞态冲突
              for i in 1 2 3; do
                git pull --rebase origin ${{ github.ref_name }} && git push origin HEAD:${{ github.ref_name }} && break
                echo "⚠️ Push failed, retrying in 3s... (attempt $i/3)"
                sleep 3
                # 重新读取可能被其他构建更新的版本号
                CURRENT_VERSION=$(grep 'version:' pubspec.yaml | head -n 1 | awk '{print $2}' | cut -d'+' -f1)
                CURRENT_BUILD=$(grep 'version:' pubspec.yaml | head -n 1 | awk '{print $2}' | cut -d'+' -f2)
                MAJOR=$(echo $CURRENT_VERSION | cut -d'.' -f1)
                MINOR=$(echo $CURRENT_VERSION | cut -d'.' -f2)
                PATCH=$(echo $CURRENT_VERSION | cut -d'.' -f3)
                NEW_PATCH=$((PATCH + 1))
                NEW_BUILD=$((CURRENT_BUILD + 1))
                VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
                BUILD_NUMBER="${NEW_BUILD}"
                sed -i "s/version: ${CURRENT_VERSION}+${CURRENT_BUILD}/version: ${VERSION}+${BUILD_NUMBER}/" pubspec.yaml
                git add pubspec.yaml
                git commit --amend -m "chore: 自动迭代版本号 v${CURRENT_VERSION}+${CURRENT_BUILD} → v${VERSION}+${BUILD_NUMBER}"
              done
            fi
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "apk_name=pure-enjoy-v${VERSION}-build${BUILD_NUMBER}.apk" >> $GITHUB_OUTPUT
          echo "Version: $VERSION, Build: $BUILD_NUMBER"

      # 10. 构建 APK
      - name: Build APK
        run: |
          flutter build apk --release \
            --build-name=${{ steps.version.outputs.version }} \
            --build-number=${{ steps.version.outputs.build_number }}

      # 11. 查找并重命名 APK 文件
      - name: Find and rename APK
        id: rename
        run: |
          # 查找 APK 文件
          APK_PATH=$(find build/app/outputs/flutter-apk -name "*.apk" | head -1)
          echo "Found APK: $APK_PATH"
          
          if [ -z "$APK_PATH" ]; then
            echo "No APK found!"
            ls -la build/app/outputs/
            ls -la build/app/outputs/flutter-apk/ 2>/dev/null || echo "flutter-apk dir not found"
            exit 1
          fi
          
          # 重命名
          mkdir -p build/app/outputs/apk/release/
          cp "$APK_PATH" "build/app/outputs/apk/release/${{ steps.version.outputs.apk_name }}"
          ls -lh build/app/outputs/apk/release/

      # 12. 计算 APK 文件哈希
      - name: Calculate APK checksum
        id: checksum
        run: |
          CHECKSUM=$(sha256sum "build/app/outputs/apk/release/${{ steps.version.outputs.apk_name }}" | awk '{print $1}')
          echo "sha256=$CHECKSUM" >> $GITHUB_OUTPUT
          echo "SHA256: $CHECKSUM"

      # 13. 获取文件大小
      - name: Get APK file size
        id: filesize
        run: |
          APK_PATH="build/app/outputs/apk/release/${{ steps.version.outputs.apk_name }}"
          echo "Checking APK at: $APK_PATH"
          ls -lh "$APK_PATH"
          FILESIZE=$(stat -c%s "$APK_PATH")
          echo "bytes=$FILESIZE" >> $GITHUB_OUTPUT
          echo "file_size=$FILESIZE" >> $GITHUB_OUTPUT
          echo "Size: $FILESIZE bytes"

      # 14. 上传 APK 到 Supabase Storage
      - name: Upload APK to Supabase Storage
        id: upload
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          SUPABASE_URL="https://$SUPABASE_PROJECT_ID.supabase.co"
          DOWNLOAD_URL="$SUPABASE_URL/storage/v1/object/public/apk-releases/${{ steps.version.outputs.apk_name }}"
          
          echo "Uploading to: $DOWNLOAD_URL"
          
          # 使用 curl 上传文件，带错误检查
          echo "Starting upload..."
          echo "File to upload: build/app/outputs/apk/release/${{ steps.version.outputs.apk_name }}"
          ls -lh "build/app/outputs/apk/release/${{ steps.version.outputs.apk_name }}"
          
          # Try upload with upsert header (allows overwriting)
          UPLOAD_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$SUPABASE_URL/storage/v1/object/apk-releases/${{ steps.version.outputs.apk_name }}" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/vnd.android.package-archive" \
            -H "x-upsert: true" \
            --data-binary @"build/app/outputs/apk/release/${{ steps.version.outputs.apk_name }}")
          
          HTTP_CODE=$(echo "$UPLOAD_RESPONSE" | tail -n1)
          RESPONSE_BODY=$(echo "$UPLOAD_RESPONSE" | sed '$d')
          
          echo "Upload HTTP Code: $HTTP_CODE"
          echo "Upload Response: $RESPONSE_BODY"
          
          if [ "$HTTP_CODE" -ne 200 ] && [ "$HTTP_CODE" -ne 201 ]; then
            echo "❌ Upload failed with HTTP $HTTP_CODE"
            exit 1
          fi
          
          echo "download_url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT
          echo "✅ Uploaded to: $DOWNLOAD_URL"

      # 15. 创建版本记录到数据库
      - name: Create version record in database
        id: db_record
        env:
          SUPABASE_URL: https://${{ secrets.SUPABASE_PROJECT_ID }}.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          # 获取上次构建时间（从 app_versions 表的最新记录中获取）
          LAST_BUILD_TIME=$(curl -s "$SUPABASE_URL/rest/v1/app_versions?select=created_at&order=created_at.desc&limit=1" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" | \
            python3 -c 'import sys, json; data=json.load(sys.stdin); print(data[0].get("created_at","") if data else "")' 2>/dev/null || echo '')

          CURRENT_SHA="${{ github.sha }}"
          echo "Last build time: ${LAST_BUILD_TIME:-none}"
          echo "Current SHA: $CURRENT_SHA"

          # 收集上次构建到本次构建之间的所有 commit messages
          if [ -n "$LAST_BUILD_TIME" ]; then
            # 使用 --since 基于时间获取 commits，并去掉提交类型前缀(feat:/fix:等)
            COMMIT_LIST=$(git log --pretty=format:"%s" --since="$LAST_BUILD_TIME" 2>/dev/null | grep -v "^chore:" | sed 's/^[a-z]*[[:space:]]*:[[:space:]]*//' | sed 's/^[a-z]*([^)]*):[[:space:]]*//' || echo "")
          else
            # 首次构建，取最近 10 条
            COMMIT_LIST=$(git log --pretty=format:"%s" -n 10 2>/dev/null | grep -v "^chore:" | sed 's/^[a-z]*[[:space:]]*:[[:space:]]*//' | sed 's/^[a-z]*([^)]*):[[:space:]]*//' || echo "")
          fi

          # 格式化 release notes
          if [ -n "$COMMIT_LIST" ]; then
            RELEASE_NOTES="$COMMIT_LIST"
          else
            RELEASE_NOTES="自动构建版本 ${{ steps.version.outputs.version }}+${{ steps.version.outputs.build_number }}"
          fi

          echo "Release notes:"
          echo -e "$RELEASE_NOTES"
          echo ""
          
          echo "Creating database record..."
          
          # 根据是否强制更新决定 release_type
          RELEASE_TYPE="feature"
          
          # 计算可读文件大小
          FILE_SIZE_HUMAN=$(numfmt --to=iec-i ${{ steps.filesize.outputs.bytes }})
          
          DB_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$SUPABASE_URL/rest/v1/app_versions" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            -d "{
              \"version\": \"${{ steps.version.outputs.version }}\",
              \"build_number\": ${{ steps.version.outputs.build_number }},
              \"platform\": \"android\",
              \"release_type\": \"$RELEASE_TYPE\",
              \"release_notes\": \"$RELEASE_NOTES\",
              \"apk_url\": \"${{ steps.upload.outputs.download_url }}\",
              \"apk_size\": ${{ steps.filesize.outputs.bytes }},
              \"file_name\": \"${{ steps.version.outputs.apk_name }}\",
              \"checksum\": \"${{ steps.checksum.outputs.sha256 }}\",
              \"status\": \"released\",
              \"is_active\": true,
              \"is_force_update\": false,
              \"released_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",
              \"created_by\": \"GitHub Actions\"
            }")
          
          DB_HTTP_CODE=$(echo "$DB_RESPONSE" | tail -n1)
          DB_RESPONSE_BODY=$(echo "$DB_RESPONSE" | sed '$d')
          
          echo "Database HTTP Code: $DB_HTTP_CODE"
          echo "Database response: $DB_RESPONSE_BODY"
          
          # 处理插入结果
          if [ "$DB_HTTP_CODE" = "201" ] || [ "$DB_HTTP_CODE" = "200" ]; then
            echo "version_id=$(echo $DB_RESPONSE_BODY | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)" >> $GITHUB_OUTPUT
            echo "✅ Database record created successfully"
          else
            echo "⚠️ Database operation returned HTTP $DB_HTTP_CODE, continuing anyway..."
          fi

      # 16. 清理旧 APK（只保留最新 5 个）
      - name: Clean old APKs from Storage
        env:
          SUPABASE_URL: https://${{ secrets.SUPABASE_PROJECT_ID }}.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "清理旧 APK 文件（保留最新 5 个）..."
          
          # 获取文件列表（跳过最新5个）
          FILES=$(curl -s "$SUPABASE_URL/storage/v1/object/list/apk-releases" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d '{"prefix":"","limit":200,"sortBy":{"column":"created_at","order":"desc"}}' | \
            python3 -c 'import sys,json; d=json.load(sys.stdin); items=d if isinstance(d,list) else d.get("data",d.get("items",[])); [print(i.get("name","")) for i in items[5:]]')
          
          TOTAL=0
          DELETED=0
          for FILE in $FILES; do
            if [ -z "$FILE" ]; then continue; fi
            TOTAL=$((TOTAL + 1))
            
            # 1. 先从 Storage 删除 APK 文件
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE "$SUPABASE_URL/storage/v1/object/apk-releases/$FILE" \
              -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY")
            
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "204" ] || [ "$HTTP_CODE" = "404" ]; then
              DELETED=$((DELETED + 1))
              echo "🗑️ 已删除: $FILE"
              
              # 2. 将对应版本记录标记为失效（inactive）
              # 从文件名提取版本号：pure-enjoy-v{version}-build{build_number}.apk
              VERSION=$(echo "$FILE" | sed -n 's/pure-enjoy-v\(.*\)-build.*/\1/p')
              BUILD_NUM=$(echo "$FILE" | sed -n 's/.*-build\([0-9]*\)\.apk/\1/p')
              
              if [ -n "$VERSION" ] && [ -n "$BUILD_NUM" ]; then
                curl -s -o /dev/null -X PATCH "$SUPABASE_URL/rest/v1/app_versions?version=eq.$VERSION&build_number=eq.$BUILD_NUM" \
                  -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
                  -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
                  -H "Content-Type: application/json" \
                  -d '{
                    "status":"inactive",
                    "is_active":false,
                    "revoked_at":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"
                  }'
                echo "   📋 版本记录已标记为失效: v$VERSION+$BUILD_NUM"
              fi
            else
              echo "⚠️ 删除失败: $FILE (HTTP $HTTP_CODE)"
            fi
          done
          
          echo "✅ 清理完成：删除 $DELETED / $TOTAL 个旧 APK，对应版本记录已标记为失效"

      # 17. 创建 GitHub Release（仅标签触发时）
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/apk/release/${{ steps.version.outputs.apk_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 18. 输出总结
      - name: Build summary
        run: |
          echo "✅ Build completed!"
          echo "📱 Version: ${{ steps.version.outputs.version }}+${{ steps.version.outputs.build_number }}"
          echo "📦 File: ${{ steps.version.outputs.apk_name }}"
          echo "🔗 Download: ${{ steps.upload.outputs.download_url }}"
          echo "💾 Size: ${{ steps.filesize.outputs.bytes }} bytes"
          echo "🔐 SHA256: ${{ steps.checksum.outputs.sha256 }}"
