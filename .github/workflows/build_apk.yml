name: Build APK and Upload to Supabase

on:
  push:
    branches: [main, master, develop]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'зүҲжң¬еҸ· (еҰӮ: 1.0.0)'
        required: true
        default: '1.0.0'
      build_number:
        description: 'жһ„е»әеҸ· (еҰӮ: 1)'
        required: true
        default: '1'
      release_notes:
        description: 'жӣҙж–°иҜҙжҳҺ'
        required: false
        default: ''
      is_force_update:
        description: 'ејәеҲ¶жӣҙж–°'
        required: false
        default: 'false'

env:
  FLUTTER_VERSION: '3.24.0'
  JAVA_VERSION: '17'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
      packages: write

    steps:
      # 1. жЈҖеҮәд»Јз Ғ
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. и®ҫзҪ® Java зҺҜеўғ
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      # 3. и®ҫзҪ® Flutter зҺҜеўғ
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-dependency-path: pubspec.lock

      # 4. йӘҢиҜҒ Flutter зҺҜеўғ
      - name: Verify Flutter installation
        run: |
          flutter --version
          flutter doctor -v

      # 5. иҺ·еҸ–дҫқиө–
      - name: Get dependencies
        run: flutter pub get

      # 6. иҝҗиЎҢд»Јз Ғз”ҹжҲҗпјҲеҰӮжһңжңү build_runnerпјү
      - name: Run build_runner (if needed)
        run: |
          if grep -q "build_runner" pubspec.yaml; then
            flutter pub run build_runner build --delete-conflicting-outputs || true
          fi

      # 7. иҝҗиЎҢжөӢиҜ•пјҲеҸҜйҖүпјү
      - name: Run tests
        run: flutter test || true

      # 8. жҸҗеҸ–зүҲжң¬дҝЎжҒҜ
      - name: Extract version info
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            BUILD_NUMBER="${{ github.event.inputs.build_number }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            BUILD_NUMBER=$(git rev-list --count HEAD)
          else
            VERSION=$(grep 'version:' pubspec.yaml | head -n 1 | awk '{print $2}' | cut -d'+' -f1)
            BUILD_NUMBER=$(git rev-list --count HEAD)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "apk_name=pure-enjoy-v${VERSION}+${BUILD_NUMBER}.apk" >> $GITHUB_OUTPUT
          echo "Version: $VERSION, Build: $BUILD_NUMBER"

      # 9. жӣҙж–° pubspec.yaml зүҲжң¬еҸ·
      - name: Update version in pubspec.yaml
        run: |
          sed -i "s/^version: .*/version: ${{ steps.version.outputs.version }}+${{ steps.version.outputs.build_number }}/" pubspec.yaml
          cat pubspec.yaml | grep version

      # 10. жһ„е»ә APK
      - name: Build APK
        run: |
          flutter build apk --release \
            --build-name=${{ steps.version.outputs.version }} \
            --build-number=${{ steps.version.outputs.build_number }}

      # 11. жҹҘжүҫе№¶йҮҚе‘ҪеҗҚ APK ж–Үд»¶
      - name: Find and rename APK
        id: rename
        run: |
          # жҹҘжүҫ APK ж–Үд»¶
          APK_PATH=$(find build/app/outputs/flutter-apk -name "*.apk" | head -1)
          echo "Found APK: $APK_PATH"
          
          if [ -z "$APK_PATH" ]; then
            echo "No APK found!"
            ls -la build/app/outputs/
            ls -la build/app/outputs/flutter-apk/ 2>/dev/null || echo "flutter-apk dir not found"
            exit 1
          fi
          
          # йҮҚе‘ҪеҗҚ
          mkdir -p build/app/outputs/apk/release/
          cp "$APK_PATH" "build/app/outputs/apk/release/${{ steps.version.outputs.apk_name }}"
          ls -lh build/app/outputs/apk/release/

      # 12. и®Ўз®— APK ж–Үд»¶е“ҲеёҢ
      - name: Calculate APK checksum
        id: checksum
        run: |
          CHECKSUM=$(sha256sum "build/app/outputs/apk/release/${{ steps.version.outputs.apk_name }}" | awk '{print $1}')
          echo "sha256=$CHECKSUM" >> $GITHUB_OUTPUT
          echo "SHA256: $CHECKSUM"

      # 13. иҺ·еҸ–ж–Үд»¶еӨ§е°Ҹ
      - name: Get APK file size
        id: filesize
        run: |
          APK_PATH="build/app/outputs/apk/release/${{ steps.version.outputs.apk_name }}"
          echo "Checking APK at: $APK_PATH"
          ls -lh "$APK_PATH"
          FILESIZE=$(stat -c%s "$APK_PATH")
          echo "bytes=$FILESIZE" >> $GITHUB_OUTPUT
          echo "file_size=$FILESIZE" >> $GITHUB_OUTPUT
          echo "Size: $FILESIZE bytes"

      # 14. дёҠдј  APK еҲ° Supabase Storage
      - name: Upload APK to Supabase Storage
        id: upload
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          SUPABASE_URL="https://$SUPABASE_PROJECT_ID.supabase.co"
          DOWNLOAD_URL="$SUPABASE_URL/storage/v1/object/public/apk-releases/${{ steps.version.outputs.apk_name }}"
          
          echo "Uploading to: $DOWNLOAD_URL"
          
          # дҪҝз”Ё curl дёҠдј ж–Үд»¶пјҢеёҰй”ҷиҜҜжЈҖжҹҘ
          echo "Starting upload..."
          echo "File to upload: build/app/outputs/apk/release/${{ steps.version.outputs.apk_name }}"
          ls -lh "build/app/outputs/apk/release/${{ steps.version.outputs.apk_name }}"
          
          # Try upload with upsert header (allows overwriting)
          UPLOAD_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$SUPABASE_URL/storage/v1/object/apk-releases/${{ steps.version.outputs.apk_name }}" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/vnd.android.package-archive" \
            -H "x-upsert: true" \
            --data-binary @"build/app/outputs/apk/release/${{ steps.version.outputs.apk_name }}")
          
          HTTP_CODE=$(echo "$UPLOAD_RESPONSE" | tail -n1)
          RESPONSE_BODY=$(echo "$UPLOAD_RESPONSE" | sed '$d')
          
          echo "Upload HTTP Code: $HTTP_CODE"
          echo "Upload Response: $RESPONSE_BODY"
          
          if [ "$HTTP_CODE" -ne 200 ] && [ "$HTTP_CODE" -ne 201 ]; then
            echo "вқҢ Upload failed with HTTP $HTTP_CODE"
            exit 1
          fi
          
          echo "download_url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT
          echo "вң… Uploaded to: $DOWNLOAD_URL"

      # 15. еҲӣе»әзүҲжң¬и®°еҪ•еҲ°ж•°жҚ®еә“
      - name: Create version record in database
        id: db_record
        env:
          SUPABASE_URL: https://${{ secrets.SUPABASE_PROJECT_ID }}.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          RELEASE_NOTES="${{ github.event.inputs.release_notes }}"
          if [ -z "$RELEASE_NOTES" ]; then
            RELEASE_NOTES="иҮӘеҠЁжһ„е»әзүҲжң¬ ${{ steps.version.outputs.version }}+${{ steps.version.outputs.build_number }}"
          fi
          
          IS_FORCE_UPDATE="${{ github.event.inputs.is_force_update }}"
          [ -z "$IS_FORCE_UPDATE" ] && IS_FORCE_UPDATE="false"
          
          echo "Creating database record..."
          DB_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$SUPABASE_URL/rest/v1/app_versions" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            -d "{
              \"version\": \"${{ steps.version.outputs.version }}\",
              \"build_number\": ${{ steps.version.outputs.build_number }},
              \"download_url\": \"${{ steps.upload.outputs.download_url }}\",
              \"file_size\": ${{ steps.filesize.outputs.bytes }},
              \"checksum\": \"${{ steps.checksum.outputs.sha256 }}\",
              \"release_notes\": \"$RELEASE_NOTES\",
              \"is_force_update\": $IS_FORCE_UPDATE,
              \"is_active\": true,
              \"platform\": \"android\",
              \"file_name\": \"${{ steps.version.outputs.apk_name }}\",
              \"status\": \"released\",
              \"created_by\": \"github-actions\"
            }")
          
          DB_HTTP_CODE=$(echo "$DB_RESPONSE" | tail -n1)
          DB_RESPONSE_BODY=$(echo "$DB_RESPONSE" | sed '$d')
          
          echo "Database HTTP Code: $DB_HTTP_CODE"
          echo "Database response: $DB_RESPONSE_BODY"
          
          if [ "$DB_HTTP_CODE" -ne 200 ] && [ "$DB_HTTP_CODE" -ne 201 ]; then
            echo "вқҢ Database insert failed with HTTP $DB_HTTP_CODE"
            exit 1
          fi
          
          echo "version_id=$(echo $DB_RESPONSE_BODY | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)" >> $GITHUB_OUTPUT
          echo "вң… Database record created successfully"

      # 16. дёҠдј жһ„е»әдә§зү©пјҲдҪңдёәеӨҮд»Ҫпјү
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pure-enjoy-apk-${{ steps.version.outputs.version }}-${{ steps.version.outputs.build_number }}
          path: build/app/outputs/apk/release/${{ steps.version.outputs.apk_name }}
          retention-days: 30

      # 17. еҲӣе»ә GitHub ReleaseпјҲд»…ж Үзӯҫи§ҰеҸ‘ж—¶пјү
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/apk/release/${{ steps.version.outputs.apk_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 18. иҫ“еҮәжҖ»з»“
      - name: Build summary
        run: |
          echo "вң… Build completed!"
          echo "рҹ“ұ Version: ${{ steps.version.outputs.version }}+${{ steps.version.outputs.build_number }}"
          echo "рҹ“Ұ File: ${{ steps.version.outputs.apk_name }}"
          echo "рҹ”— Download: ${{ steps.upload.outputs.download_url }}"
          echo "рҹ’ҫ Size: ${{ steps.filesize.outputs.bytes }} bytes"
          echo "рҹ”җ SHA256: ${{ steps.checksum.outputs.sha256 }}"
