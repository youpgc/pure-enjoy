name: Build APK and Upload to Supabase

on:
  push:
    branches: [main, master, develop]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如: 1.0.0)'
        required: true
        default: '1.0.0'
      build_number:
        description: '构建号 (如: 1)'
        required: true
        default: '1'
      release_notes:
        description: '更新说明'
        required: false
        default: ''
      is_force_update:
        description: '强制更新'
        required: false
        default: 'false'

env:
  FLUTTER_VERSION: '3.24.0'
  JAVA_VERSION: '17'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
      packages: write

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Java 环境
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      # 3. 设置 Flutter 环境
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-dependency-path: pubspec.lock

      # 4. 验证 Flutter 环境
      - name: Verify Flutter installation
        run: |
          flutter --version
          flutter doctor -v

      # 5. 获取依赖
      - name: Get dependencies
        run: flutter pub get

      # 6. 运行代码生成（如果有 build_runner）
      - name: Run build_runner (if needed)
        run: |
          if grep -q "build_runner" pubspec.yaml; then
            flutter pub run build_runner build --delete-conflicting-outputs || true
          fi

      # 7. 运行测试（可选）
      - name: Run tests
        run: flutter test || true

      # 8. 提取版本信息
      - name: Extract version info
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            BUILD_NUMBER="${{ github.event.inputs.build_number }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            BUILD_NUMBER=$(git rev-list --count HEAD)
          else
            VERSION=$(grep 'version:' pubspec.yaml | head -n 1 | awk '{print $2}' | cut -d'+' -f1)
            BUILD_NUMBER=$(grep 'version:' pubspec.yaml | head -n 1 | awk '{print $2}' | cut -d'+' -f2)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "apk_name=pure-enjoy-v${VERSION}+${BUILD_NUMBER}.apk" >> $GITHUB_OUTPUT
          echo "Version: $VERSION, Build: $BUILD_NUMBER"

      # 10. 构建 APK
      - name: Build APK
        run: |
          flutter build apk --release \
            --build-name=${{ steps.version.outputs.version }} \
            --build-number=${{ steps.version.outputs.build_number }}

      # 11. 查找并重命名 APK 文件
      - name: Find and rename APK
        id: rename
        run: |
          # 查找 APK 文件
          APK_PATH=$(find build/app/outputs/flutter-apk -name "*.apk" | head -1)
          echo "Found APK: $APK_PATH"
          
          if [ -z "$APK_PATH" ]; then
            echo "No APK found!"
            ls -la build/app/outputs/
            ls -la build/app/outputs/flutter-apk/ 2>/dev/null || echo "flutter-apk dir not found"
            exit 1
          fi
          
          # 重命名
          mkdir -p build/app/outputs/apk/release/
          cp "$APK_PATH" "build/app/outputs/apk/release/${{ steps.version.outputs.apk_name }}"
          ls -lh build/app/outputs/apk/release/

      # 12. 计算 APK 文件哈希
      - name: Calculate APK checksum
        id: checksum
        run: |
          CHECKSUM=$(sha256sum "build/app/outputs/apk/release/${{ steps.version.outputs.apk_name }}" | awk '{print $1}')
          echo "sha256=$CHECKSUM" >> $GITHUB_OUTPUT
          echo "SHA256: $CHECKSUM"

      # 13. 获取文件大小
      - name: Get APK file size
        id: filesize
        run: |
          APK_PATH="build/app/outputs/apk/release/${{ steps.version.outputs.apk_name }}"
          echo "Checking APK at: $APK_PATH"
          ls -lh "$APK_PATH"
          FILESIZE=$(stat -c%s "$APK_PATH")
          echo "bytes=$FILESIZE" >> $GITHUB_OUTPUT
          echo "file_size=$FILESIZE" >> $GITHUB_OUTPUT
          echo "Size: $FILESIZE bytes"

      # 14. 上传 APK 到 Supabase Storage
      - name: Upload APK to Supabase Storage
        id: upload
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          SUPABASE_URL="https://$SUPABASE_PROJECT_ID.supabase.co"
          DOWNLOAD_URL="$SUPABASE_URL/storage/v1/object/public/apk-releases/${{ steps.version.outputs.apk_name }}"
          
          echo "Uploading to: $DOWNLOAD_URL"
          
          # 使用 curl 上传文件，带错误检查
          echo "Starting upload..."
          echo "File to upload: build/app/outputs/apk/release/${{ steps.version.outputs.apk_name }}"
          ls -lh "build/app/outputs/apk/release/${{ steps.version.outputs.apk_name }}"
          
          # Try upload with upsert header (allows overwriting)
          UPLOAD_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$SUPABASE_URL/storage/v1/object/apk-releases/${{ steps.version.outputs.apk_name }}" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/vnd.android.package-archive" \
            -H "x-upsert: true" \
            --data-binary @"build/app/outputs/apk/release/${{ steps.version.outputs.apk_name }}")
          
          HTTP_CODE=$(echo "$UPLOAD_RESPONSE" | tail -n1)
          RESPONSE_BODY=$(echo "$UPLOAD_RESPONSE" | sed '$d')
          
          echo "Upload HTTP Code: $HTTP_CODE"
          echo "Upload Response: $RESPONSE_BODY"
          
          if [ "$HTTP_CODE" -ne 200 ] && [ "$HTTP_CODE" -ne 201 ]; then
            echo "❌ Upload failed with HTTP $HTTP_CODE"
            exit 1
          fi
          
          echo "download_url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT
          echo "✅ Uploaded to: $DOWNLOAD_URL"

      # 14.5 确保app_configs表存在
      - name: Ensure app_configs table exists
        env:
          SUPABASE_URL: https://${{ secrets.SUPABASE_PROJECT_ID }}.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "Checking if app_configs table exists..."
          TABLE_CHECK=$(curl -s -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/app_configs?select=id&limit=1" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY")
          
          if [ "$TABLE_CHECK" = "200" ]; then
            echo "✅ app_configs table already exists"
          else
            echo "⚠️ app_configs table does not exist, creating via direct DB connection..."
            # Try direct PostgreSQL connection if DB URL is available
            if [ -n "$SUPABASE_DB_URL" ]; then
              apt-get update -qq && apt-get install -qq -y postgresql-client > /dev/null 2>&1
              psql "$SUPABASE_DB_URL" << 'EOSQL'
              CREATE TABLE IF NOT EXISTS app_configs (
                id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
                config_key VARCHAR(100) NOT NULL UNIQUE,
                title VARCHAR(200) NOT NULL,
                content TEXT NOT NULL DEFAULT '',
                config_type VARCHAR(50) NOT NULL DEFAULT 'rich_text',
                sort_order INT NOT NULL DEFAULT 0,
                is_active BOOLEAN NOT NULL DEFAULT true,
                created_at TIMESTAMPTZ NOT NULL DEFAULT now(),
                updated_at TIMESTAMPTZ NOT NULL DEFAULT now()
              );
              
              CREATE INDEX IF NOT EXISTS idx_app_configs_key ON app_configs(config_key);
              CREATE INDEX IF NOT EXISTS idx_app_configs_active ON app_configs(is_active);
              
              ALTER TABLE app_configs ENABLE ROW LEVEL SECURITY;
              
              DO $$ BEGIN
                CREATE POLICY "Anyone can view active app configs" ON app_configs
                  FOR SELECT USING (is_active = true);
              EXCEPTION WHEN duplicate_object THEN NULL;
              END $$;
              
              DO $$ BEGIN
                CREATE POLICY "Admins can manage app configs" ON app_configs
                  FOR ALL USING (
                    EXISTS (SELECT 1 FROM users WHERE users.id = auth.uid() AND users.role IN ('admin', 'super_admin'))
                  );
              EXCEPTION WHEN duplicate_object THEN NULL;
              END $$;
              
              INSERT INTO app_configs (config_key, title, content, config_type, sort_order) VALUES
              ('about', '关于纯享', '<h2>关于纯享</h2><p>纯享是一款专注于记录生活的应用，帮助您轻松管理日常记账、心情日记、体重记录等。</p><p>版本：1.6.0</p>', 'rich_text', 1),
              ('privacy_policy', '隐私政策', '<h2>隐私政策</h2><p>我们重视您的隐私保护。本隐私政策说明了我们如何收集、使用和保护您的个人信息。</p><h3>1. 信息收集</h3><p>我们仅收集为您提供服务所必需的信息。</p><h3>2. 信息使用</h3><p>您的信息仅用于提供和改善我们的服务。</p><h3>3. 信息保护</h3><p>我们采用行业标准的安全措施保护您的个人信息。</p>', 'rich_text', 2),
              ('user_agreement', '用户协议', '<h2>用户协议</h2><p>欢迎使用纯享！请仔细阅读以下条款。</p><h3>1. 服务说明</h3><p>纯享为用户提供生活记录和管理服务。</p><h3>2. 用户责任</h3><p>用户应合法使用本应用，不得利用本应用从事违法活动。</p><h3>3. 知识产权</h3><p>本应用的所有内容均受知识产权法保护。</p>', 'rich_text', 3),
              ('help_center', '帮助中心', '<h2>帮助中心</h2><h3>常见问题</h3><p><strong>Q: 如何添加记账记录？</strong></p><p>A: 进入"生活"页面，点击"记账"模块，即可添加新的消费记录。</p><p><strong>Q: 如何写心情日记？</strong></p><p>A: 进入"生活"页面，点击"心情日记"模块，选择当天心情并写下感受。</p><p><strong>Q: 数据会同步到云端吗？</strong></p><p>A: 是的，您的数据会自动同步到云端，换设备登录后即可恢复。</p><p><strong>Q: 如何联系客服？</strong></p><p>A: 您可以通过邮件 pureenjoy@example.com 联系我们。</p>', 'rich_text', 4)
              ON CONFLICT (config_key) DO NOTHING;
              EOSQL
              echo "✅ app_configs table created via direct DB connection"
            else
              echo "⚠️ No SUPABASE_DB_URL available, skipping table creation"
              echo "⚠️ Please create the app_configs table manually via Supabase Dashboard SQL Editor"
              echo "⚠️ SQL file available at: database/create_app_configs.sql"
            fi
          fi

      # 15. 创建版本记录到数据库
      - name: Create version record in database
        id: db_record
        env:
          SUPABASE_URL: https://${{ secrets.SUPABASE_PROJECT_ID }}.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          RELEASE_NOTES="${{ github.event.inputs.release_notes }}"
          if [ -z "$RELEASE_NOTES" ]; then
            RELEASE_NOTES="自动构建版本 ${{ steps.version.outputs.version }}+${{ steps.version.outputs.build_number }}"
          fi
          
          IS_FORCE_UPDATE="${{ github.event.inputs.is_force_update }}"
          [ -z "$IS_FORCE_UPDATE" ] && IS_FORCE_UPDATE="false"
          
          echo "Creating database record..."
          
          # 根据是否强制更新决定 release_type
          if [ "$IS_FORCE_UPDATE" = "true" ]; then
            RELEASE_TYPE="force"
          else
            RELEASE_TYPE="feature"
          fi
          
          # 先将其他所有已发布版本改为已下架
          echo "Revoking other released versions..."
          curl -s -X PATCH "$SUPABASE_URL/rest/v1/app_versions?status=eq.released" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d '{"status":"revoked","revoked_at":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' > /dev/null 2>&1 || true

          # 先尝试删除已存在的同版本记录（避免 409 冲突）
          curl -s -X DELETE "$SUPABASE_URL/rest/v1/app_versions?version=eq.${{ steps.version.outputs.version }}&build_number=eq.${{ steps.version.outputs.build_number }}" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" > /dev/null 2>&1 || true
          
          DB_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$SUPABASE_URL/rest/v1/app_versions" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            -d "{
              \"version\": \"${{ steps.version.outputs.version }}\",
              \"build_number\": ${{ steps.version.outputs.build_number }},
              \"release_type\": \"$RELEASE_TYPE\",
              \"release_notes\": \"$RELEASE_NOTES\",
              \"apk_url\": \"${{ steps.upload.outputs.download_url }}\",
              \"apk_size\": ${{ steps.filesize.outputs.bytes }},
              \"status\": \"released\",
              \"released_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",
              \"created_by\": null
            }")
          
          DB_HTTP_CODE=$(echo "$DB_RESPONSE" | tail -n1)
          DB_RESPONSE_BODY=$(echo "$DB_RESPONSE" | sed '$d')
          
          echo "Database HTTP Code: $DB_HTTP_CODE"
          echo "Database response: $DB_RESPONSE_BODY"
          
          if [ "$DB_HTTP_CODE" -ne 200 ] && [ "$DB_HTTP_CODE" -ne 201 ]; then
            echo "❌ Database insert failed with HTTP $DB_HTTP_CODE"
            exit 1
          fi
          
          echo "version_id=$(echo $DB_RESPONSE_BODY | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)" >> $GITHUB_OUTPUT
          echo "✅ Database record created successfully"

      # 16. 上传构建产物（作为备份）
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pure-enjoy-apk-${{ steps.version.outputs.version }}-${{ steps.version.outputs.build_number }}
          path: build/app/outputs/apk/release/${{ steps.version.outputs.apk_name }}
          retention-days: 30

      # 17. 创建 GitHub Release（仅标签触发时）
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/apk/release/${{ steps.version.outputs.apk_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 18. 输出总结
      - name: Build summary
        run: |
          echo "✅ Build completed!"
          echo "📱 Version: ${{ steps.version.outputs.version }}+${{ steps.version.outputs.build_number }}"
          echo "📦 File: ${{ steps.version.outputs.apk_name }}"
          echo "🔗 Download: ${{ steps.upload.outputs.download_url }}"
          echo "💾 Size: ${{ steps.filesize.outputs.bytes }} bytes"
          echo "🔐 SHA256: ${{ steps.checksum.outputs.sha256 }}"
