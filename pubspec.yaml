name: pure_enjoy
description: 纯享App - 记录生活，享受每一天
publish_to: 'none'
version: 1.9.79+121

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # 使用 HTTP 客户端直接访问 Supabase REST API
  http: ^1.1.0
  # Supabase Flutter SDK（用于获取 JWT access token）
  # supabase_flutter: ^2.8.0  # 暂时移除，app_links与Flutter版本不兼容
  # 本地存储
  shared_preferences: ^2.2.2
  # 状态管理
  provider: ^6.1.1
  # 工具
  intl: ^0.19.0
  uuid: ^4.3.1
  # 密码加密
  crypto: ^3.0.3
  # 版本信息
  package_info_plus: ^4.2.0
  # URL 启动器
  url_launcher: ^6.2.2
  # 文件路径
  path_provider: ^2.1.2
  # 文件分享
  share_plus: ^7.2.1
  # 权限管理
  permission_handler: ^11.3.0
  # 打开文件（安装APK）
  open_filex: ^4.5.0
  # 下载进度通知
  flutter_downloader: ^1.11.6
  flutter_local_notifications: ^19.4.2
  timezone: ^0.10.0
  # timezone: ^0.9.2
  # 图片选择器（头像上传）
  image_picker: ^1.0.7
  # 图表库
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
