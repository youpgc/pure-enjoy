name: pure_enjoy
description: 纯享App - 记录生活，享受每一天
publish_to: 'none'
version: 1.4.1+13

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # 使用 HTTP 客户端直接访问 Supabase REST API
  http: ^1.1.0
  # 本地存储
  shared_preferences: ^2.2.2
  # 状态管理
  provider: ^6.1.1
  # 工具
  intl: ^0.19.0
  uuid: ^4.3.1
  # 密码加密
  crypto: ^3.0.3
  # 版本信息
  package_info_plus: ^4.2.0
  # URL 启动器
  url_launcher: ^6.2.2
  # 本地通知功能暂时禁用（兼容性问题）
  # flutter_local_notifications: ^15.1.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
