name: pure_enjoy
description: 纯享 - 免费小说与生活记录App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 状态管理
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # 云端服务
  supabase_flutter: ^2.3.0
  
  # 网络请求
  dio: ^5.4.0
  
  # UI组件
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  
  # 工具类
  intl: ^0.18.1
  uuid: ^4.3.1
  path_provider: ^2.1.2
  url_launcher: ^6.2.4
  
  # 数据处理
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  hive_generator: ^2.0.1
  json_serializable: ^6.7.1
  freezed: ^2.4.6
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  
  assets:
    - assets/icons/
